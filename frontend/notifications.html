<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Smart Campus</title>
    <link rel="stylesheet" href="css/new-design-system.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/logo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="modern-navbar">
        <a href="index.html" class="smart-campus-logo">
            <div class="logo-icon-wrapper">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
            </div>
            <div class="logo-text">
                <div class="logo-text-main">Smart Campus</div>
                <div class="logo-text-sub">Event Management</div>
            </div>
        </a>
        <div class="modern-nav-links">
            <a href="dashboard.html"><i class="fas fa-home"></i> <span>Dashboard</span></a>
            <a href="events.html"><i class="fas fa-calendar"></i> <span>Events</span></a>
            <a href="venues.html"><i class="fas fa-building"></i> <span>Venues</span></a>
            <a href="bookings.html"><i class="fas fa-calendar-check"></i> <span>Bookings</span></a>
            <a href="waitlist.html"><i class="fas fa-clock"></i> <span>Waitlist</span></a>
            <a href="resources.html"><i class="fas fa-boxes"></i> <span>Resources</span></a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> <span>Reports</span></a>
            
            <!-- Bell Icon -->
            <div class="nav-bell" onclick="toggleBellDropdown(event)">
                <i class="fas fa-bell"></i>
                <span class="bell-badge" id="bellBadge">0</span>
                
                <div class="bell-dropdown" id="bellDropdown" onclick="event.stopPropagation()">
                    <div class="bell-dropdown-header">
                        <h4>Notifications</h4>
                        <button class="btn-modern btn-small btn-primary" onclick="markAllAsReadFromBell()">Mark all read</button>
                    </div>
                    <div class="bell-dropdown-list" id="bellDropdownList">
                        <p style="padding:1rem;text-align:center;color:#94a3b8">Loading...</p>
                    </div>
                    <div class="bell-dropdown-footer">
                        <a href="notifications.html">View all notifications</a>
                    </div>
                </div>
            </div>
            
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
        </div>
    </nav>

    <main class="container-modern" style="padding: var(--space-xl);">
        <div style="margin-bottom: var(--space-xl);">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-md);">
                <div>
                    <h1 style="font-size: var(--font-size-h1); font-weight: 700; color: #0f172a; margin-bottom: var(--space-sm);">
                        <i class="fas fa-bell"></i> Notifications
                    </h1>
                    <p style="color: var(--muted); font-size: var(--font-size-body);">Stay updated with your campus activities</p>
                </div>
                <div style="display: flex; gap: var(--space-sm); flex-wrap: wrap;">
                    <button class="btn-modern btn-secondary" onclick="filterNotifications('all')">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="btn-modern btn-secondary" onclick="filterNotifications('unread')">
                        <i class="fas fa-envelope"></i> Unread
                    </button>
                    <button class="btn-modern btn-primary" onclick="markAllAsRead()">
                        <i class="fas fa-check-double"></i> Mark All Read
                    </button>
                </div>
            </div>
        </div>

        <div id="notificationsList" style="display: flex; flex-direction: column; gap: var(--space-md);">
            <p style="text-align: center; padding: 2rem; color: var(--muted);"><i class="fas fa-spinner fa-spin"></i> Loading notifications...</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/notifications-helper.js"></script>
    <script>
        let allNotifications = [];
        let currentFilter = 'all';
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
                return;
            }
            
            // Get current user info
            const userStr = localStorage.getItem('user');
            if (userStr) {
                currentUser = JSON.parse(userStr);
            }
            
            await loadNotifications();
        });

        async function loadNotifications() {
            const list = document.getElementById('notificationsList');
            list.innerHTML = '<p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Loading notifications...</p>';

            try {
                const response = await api.get('/notifications');
                allNotifications = response.notifications || [];
                renderNotifications();
            } catch (error) {
                list.innerHTML = `<p class="error">❌ Failed to load notifications: ${error.message}</p>`;
            }
        }

        function renderNotifications() {
            const list = document.getElementById('notificationsList');
            
            let filtered = allNotifications;
            if (currentFilter === 'unread') {
                filtered = allNotifications.filter(n => !n.is_read);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 4rem; background: white; border-radius: var(--radius-card); box-shadow: var(--shadow-card);">
                        <i class="fas fa-bell-slash" style="font-size: 4rem; color: var(--muted); opacity: 0.5; margin-bottom: 1rem;"></i>
                        <p style="color: var(--muted); font-size: 1.1rem;">No ${currentFilter === 'unread' ? 'unread' : ''} notifications</p>
                    </div>
                `;
                return;
            }

            const iconMap = {
                event_approved: 'fa-check-circle',
                event_rejected: 'fa-times-circle',
                booking_confirmed: 'fa-calendar-check',
                booking_cancelled: 'fa-calendar-times',
                waitlist_promotion: 'fa-arrow-up',
                venue_conflict: 'fa-exclamation-triangle',
                reminder: 'fa-clock',
                system: 'fa-info-circle'
            };

            list.innerHTML = filtered.map(n => {
                const isAdminPendingBooking = currentUser?.role === 'admin' && 
                                              n.related_type === 'booking' && 
                                              n.type === 'system' && 
                                              n.title.includes('Booking Pending');
                
                return `
                <div style="background: white; border-radius: var(--radius-card); padding: var(--space-lg); box-shadow: var(--shadow-card); transition: all var(--duration-normal) var(--ease-smooth); border-left: 4px solid ${getIconColor(n.type)}; ${!n.is_read ? 'background: rgba(6, 182, 212, 0.05);' : ''}" 
                     onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='var(--shadow-hover)'" 
                     onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='var(--shadow-card)'">
                    <div style="display: flex; gap: var(--space-md); align-items: start;">
                        <div style="width: 48px; height: 48px; border-radius: 12px; background: ${getIconColor(n.type)}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <i class="fas ${iconMap[n.type] || 'fa-bell'}" style="color: white; font-size: 20px;"></i>
                        </div>
                        <div style="flex: 1; min-width: 0;">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: var(--space-sm); gap: var(--space-md);">
                                <h3 style="font-size: var(--font-size-body); font-weight: 600; color: #0f172a; margin: 0;">${escapeHtml(n.title)}</h3>
                                <span style="color: var(--muted); font-size: var(--font-size-xs); white-space: nowrap;">${getTimeAgo(n.created_at)}</span>
                            </div>
                            <p style="color: var(--muted); font-size: var(--font-size-small); margin: 0 0 var(--space-sm) 0; line-height: 1.5;">${escapeHtml(n.message)}</p>
                            <div style="display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap;">
                                <span class="status-pill ${n.type}" style="font-size: var(--font-size-xs);">${n.type.replace(/_/g, ' ')}</span>
                                ${!n.is_read ? '<span style="color: var(--cyan); font-size: var(--font-size-xs); font-weight: 600;">● Unread</span>' : ''}
                                ${n.related_id && n.related_type ? `<span style="color: var(--muted); font-size: var(--font-size-xs);">ID: ${n.related_id}</span>` : ''}
                            </div>
                            ${isAdminPendingBooking && n.related_id ? `
                                <div style="margin-top: var(--space-md); padding-top: var(--space-md); border-top: 1px solid #e2e8f0; display: flex; gap: var(--space-sm); flex-wrap: wrap;">
                                    <button class="btn-modern btn-small btn-primary" 
                                            onclick="event.stopPropagation(); approveBooking(${n.related_id}, ${n.id})"
                                            style="display: flex; align-items: center; gap: 6px;">
                                        <i class="fas fa-check"></i> Approve Booking
                                    </button>
                                    <button class="btn-modern btn-small btn-secondary" 
                                            onclick="event.stopPropagation(); viewBookingDetails(${n.related_id})"
                                            style="display: flex; align-items: center; gap: 6px;">
                                        <i class="fas fa-eye"></i> View Details
                                    </button>
                                    <button class="btn-modern btn-small" 
                                            onclick="event.stopPropagation(); rejectBooking(${n.related_id}, ${n.id})"
                                            style="display: flex; align-items: center; gap: 6px; background: var(--error); color: white;">
                                        <i class="fas fa-times"></i> Reject
                                    </button>
                                </div>
                            ` : ''}
                            ${!isAdminPendingBooking ? `
                                <div style="margin-top: var(--space-sm);">
                                    <button class="btn-modern btn-small btn-secondary" 
                                            onclick="event.stopPropagation(); markAsRead(${n.id})"
                                            style="font-size: var(--font-size-xs);">
                                        ${n.is_read ? 'Mark as Unread' : 'Mark as Read'}
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        function filterNotifications(filter) {
            currentFilter = filter;
            renderNotifications();
        }

        function getIconColor(type) {
            const colors = {
                event_approved: 'var(--success)',
                event_rejected: 'var(--error)',
                booking_confirmed: 'var(--primary)',
                booking_cancelled: 'var(--warning)',
                waitlist_promotion: 'var(--cyan)',
                venue_conflict: 'var(--error)',
                reminder: 'var(--warning)',
                system: 'var(--indigo)'
            };
            return colors[type] || 'var(--primary)';
        }

        function getTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + ' min ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
            if (seconds < 604800) return Math.floor(seconds / 86400) + ' days ago';
            return date.toLocaleDateString();
        }

        async function markAsRead(id) {
            try {
                await api.put(`/notifications/${id}/read`);
                const notification = allNotifications.find(n => n.id === id);
                if (notification) {
                    notification.is_read = true;
                }
                renderNotifications();
                updateBellBadge();
            } catch (error) {
                console.error('Failed to mark as read:', error);
            }
        }

        async function markAllAsRead() {
            try {
                await api.put('/notifications/mark-all-read');
                allNotifications.forEach(n => n.is_read = true);
                renderNotifications();
                updateBellBadge();
                showToast('All notifications marked as read', 'success');
            } catch (error) {
                showToast('Failed to mark all as read: ' + error.message, 'error');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer') || createToastContainer();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            toast.innerHTML = `
                <i class="fas fa-${icon}" style="font-size: 20px; color: var(--${type});"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastSlideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container';
            document.body.appendChild(container);
            return container;
        }

        async function approveBooking(bookingId, notificationId) {
            if (!confirm('Are you sure you want to approve this booking?')) {
                return;
            }
            
            try {
                showToast('Approving booking...', 'info');
                await api.put(`/bookings/${bookingId}/approve`);
                await api.put(`/notifications/${notificationId}/read`);
                showToast('✅ Booking approved successfully! User has been notified.', 'success');
                
                // Reload notifications after a short delay
                setTimeout(() => {
                    loadNotifications();
                }, 1000);
            } catch (error) {
                showToast('❌ Failed to approve booking: ' + error.message, 'error');
            }
        }

        async function rejectBooking(bookingId, notificationId) {
            const reason = prompt('Please provide a reason for rejection (optional):');
            if (reason === null) return; // User cancelled
            
            try {
                showToast('Rejecting booking...', 'info');
                await api.put(`/bookings/${bookingId}/cancel`);
                await api.put(`/notifications/${notificationId}/read`);
                showToast('🚫 Booking rejected. User has been notified.', 'success');
                
                // Reload notifications after a short delay
                setTimeout(() => {
                    loadNotifications();
                }, 1000);
            } catch (error) {
                showToast('❌ Failed to reject booking: ' + error.message, 'error');
            }
        }

        async function viewBookingDetails(bookingId) {
            try {
                const response = await api.get(`/bookings/${bookingId}`);
                const booking = response.booking;
                
                // Create modal to show booking details
                const modal = document.createElement('div');
                modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 1rem;';
                modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
                
                modal.innerHTML = `
                    <div style="background: white; border-radius: var(--radius-card); padding: var(--space-xl); max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-hover);">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: var(--space-lg);">
                            <h2 style="margin: 0; color: #0f172a;"><i class="fas fa-calendar-check"></i> Booking Details</h2>
                            <button onclick="this.closest('div[style*=fixed]').remove()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted);">&times;</button>
                        </div>
                        
                        <div style="display: flex; flex-direction: column; gap: var(--space-md);">
                            <div>
                                <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">Event</label>
                                <p style="margin: 4px 0 0 0; font-size: var(--font-size-body);">${booking.event?.title || 'N/A'}</p>
                            </div>
                            
                            <div>
                                <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">Venue</label>
                                <p style="margin: 4px 0 0 0; font-size: var(--font-size-body);">${booking.venue?.name || 'N/A'}</p>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);">
                                <div>
                                    <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">Start Time</label>
                                    <p style="margin: 4px 0 0 0; font-size: var(--font-size-body);">${new Date(booking.start_datetime).toLocaleString()}</p>
                                </div>
                                <div>
                                    <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">End Time</label>
                                    <p style="margin: 4px 0 0 0; font-size: var(--font-size-body);">${new Date(booking.end_datetime).toLocaleString()}</p>
                                </div>
                            </div>
                            
                            <div>
                                <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">Requested By</label>
                                <p style="margin: 4px 0 0 0; font-size: var(--font-size-body);">${booking.booked_by_profile?.first_name || ''} ${booking.booked_by_profile?.last_name || ''} (${booking.booked_by_profile?.role || 'N/A'})</p>
                            </div>
                            
                            <div>
                                <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">Status</label>
                                <p style="margin: 4px 0 0 0;"><span class="status-pill ${booking.status}">${booking.status}</span></p>
                            </div>
                            
                            ${booking.event?.description ? `
                                <div>
                                    <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">Description</label>
                                    <p style="margin: 4px 0 0 0; font-size: var(--font-size-small); color: var(--muted);">${booking.event.description}</p>
                                </div>
                            ` : ''}
                            
                            ${booking.event?.expected_attendance ? `
                                <div>
                                    <label style="font-weight: 600; color: var(--muted); font-size: var(--font-size-xs); text-transform: uppercase;">Expected Attendance</label>
                                    <p style="margin: 4px 0 0 0; font-size: var(--font-size-body);">${booking.event.expected_attendance} people</p>
                                </div>
                            ` : ''}
                        </div>
                        
                        ${booking.status === 'pending' ? `
                            <div style="margin-top: var(--space-xl); padding-top: var(--space-lg); border-top: 1px solid #e2e8f0; display: flex; gap: var(--space-sm); justify-content: flex-end;">
                                <button class="btn-modern btn-primary" onclick="this.closest('div[style*=fixed]').remove(); approveBooking(${bookingId}, 0);">
                                    <i class="fas fa-check"></i> Approve
                                </button>
                                <button class="btn-modern" onclick="this.closest('div[style*=fixed]').remove(); rejectBooking(${bookingId}, 0);" style="background: var(--error); color: white;">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
                
                document.body.appendChild(modal);
            } catch (error) {
                showToast('❌ Failed to load booking details: ' + error.message, 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
    
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
</body>
</html>
