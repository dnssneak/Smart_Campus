<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Smart Campus</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<script>
// ─── Bell Dropdown Functions ───
async function updateBellBadge() {
    try {
        const response = await api.get('/notifications/unread-count');
        const count = response.unreadCount || 0;
        const badge = document.getElementById('bellBadge');
        
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.style.display = 'block';
        } else {
            badge.style.display = 'none';
        }
    } catch (error) {
        console.error('Badge error:', error);
    }
}

async function loadBellDropdown() {
    try {
        const response = await api.get('/notifications?unreadOnly=true');
        const notifications = response.notifications || [];
        const list = document.getElementById('bellDropdownList');

        if (notifications.length === 0) {
            list.innerHTML = `<p style="padding:1.5rem;text-align:center;color:#94a3b8">No unread notifications</p>`;
            return;
        }

        const iconMap = {
            event_approved: 'fa-check-circle',
            event_rejected: 'fa-times-circle',
            booking_confirmed: 'fa-calendar-check',
            booking_cancelled: 'fa-calendar-times',
            waitlist_promotion: 'fa-arrow-up',
            venue_conflict: 'fa-exclamation-triangle',
            system: 'fa-info-circle'
        };

        list.innerHTML = notifications.slice(0, 5).map(n => `
            <div class="bell-dropdown-item ${n.is_read ? '' : 'unread'}" onclick="window.location.href='notifications.html'">
                <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${getIconColor(n.type)};color:white;font-size:0.9rem">
                    <i class="fas ${iconMap[n.type] || 'fa-bell'}"></i>
                </div>
                <div style="flex:1">
                    <div style="font-weight:600;font-size:0.9rem;color:#1e293b">${n.title}</div>
                    <div style="font-size:0.8rem;color:#64748b">${n.message.substring(0, 50)}${n.message.length > 50 ? '...' : ''}</div>
                    <small>${getTimeAgo(n.created_at)}</small>
                </div>
            </div>
        `).join('');

    } catch (error) {
        console.error('Dropdown error:', error);
    }
}

function getIconColor(type) {
    const colors = {
        event_approved: '#059669',
        event_rejected: '#dc2626',
        booking_confirmed: '#2563eb',
        booking_cancelled: '#d97706',
        waitlist_promotion: '#6366f1',
        venue_conflict: '#db2777',
        system: '#6b7280'
    };
    return colors[type] || '#6366f1';
}

function getTimeAgo(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);
    
    if (seconds < 60) return 'Just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function toggleBellDropdown(e) {
    e.stopPropagation();
    document.getElementById('bellDropdown').classList.toggle('show');
}

async function markAllAsReadFromBell() {
    try {
        await api.put('/notifications/mark-all-read');
        updateBellBadge();
        loadBellDropdown();
    } catch (error) {
        console.error('Mark all read error:', error);
    }
}

// Close dropdown when clicking outside
document.addEventListener('click', () => {
    const dropdown = document.getElementById('bellDropdown');
    if (dropdown) dropdown.classList.remove('show');
});

// Auto-refresh badge every 30 seconds
setInterval(() => {
    if (localStorage.getItem('token')) {
        updateBellBadge();
        loadBellDropdown();
    }
}, 30000);

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('token')) {
        updateBellBadge();
        loadBellDropdown();
    }
});
</script>
<body>
   <nav class="navbar">
    <div class="nav-brand">
        <i class="fas fa-university"></i>
        <span>Smart Campus</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="events.html">Events</a>
        <a href="venues.html">Venues</a>
        <a href="bookings.html">My Bookings</a>
        <a href="waitlist.html">Waitlist</a>
        <a href="reports.html">Reports</a>
        
        <!-- Bell Icon -->
        <div class="nav-bell" onclick="toggleBellDropdown(event)">
            <i class="fas fa-bell"></i>
            <span class="bell-badge" id="bellBadge">0</span>
            
            <div class="bell-dropdown" id="bellDropdown" onclick="event.stopPropagation()">
                <div class="bell-dropdown-header">
                    <h4>Notifications</h4>
                    <button class="btn btn-small" onclick="markAllAsReadFromBell()">Mark all read</button>
                </div>
                <div class="bell-dropdown-list" id="bellDropdownList">
                    <p style="padding:1rem;text-align:center;color:#94a3b8">Loading...</p>
                </div>
                <div class="bell-dropdown-footer">
                    <a href="notifications.html">View all notifications</a>
                </div>
            </div>
        </div>
        
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</nav>
    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-calendar-check"></i> My Bookings</h1>
        </div>

        <div id="bookingsList" class="bookings-list">
            <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Loading bookings...</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
                return;
            }
            await loadBookings();
        });

        async function loadBookings() {
            const list = document.getElementById('bookingsList');

            try {
                const response = await api.get('/bookings');
                const bookings = response.bookings || [];

                if (bookings.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-calendar-times"></i>
                            <p>No bookings yet</p>
                            <a href="venues.html" class="btn btn-primary">Book a Venue</a>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = bookings.map(b => `
                    <div class="booking-card ${b.status}">
                        <div class="booking-header">
                            <div>
                                <h3>${b.event?.title || 'Event'}</h3>
                                <span class="venue-name"><i class="fas fa-building"></i> ${b.venue?.name || 'Unknown Venue'}</span>
                            </div>
                            <span class="status-badge ${b.status}">${b.status}</span>
                        </div>
                        
                        <div class="booking-details">
                            <div class="detail">
                                <i class="fas fa-calendar"></i>
                                <span>${formatDate(b.start_datetime)}</span>
                            </div>
                            <div class="detail">
                                <i class="fas fa-clock"></i>
                                <span>${formatTime(b.start_datetime)} - ${formatTime(b.end_datetime)}</span>
                            </div>
                            <div class="detail">
                                <i class="fas fa-users"></i>
                                <span>${b.venue?.capacity || 'N/A'} capacity</span>
                            </div>
                            <div class="detail">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>${b.venue?.location || 'Campus'}</span>
                            </div>
                        </div>

                        <div class="booking-actions">
                            ${b.status === 'pending' ? `
                                <button class="btn btn-small btn-danger" onclick="cancelBooking(${b.id})">
                                    <i class="fas fa-times"></i> Cancel
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                list.innerHTML = `<p class="error">❌ Failed to load bookings: ${error.message}</p>`;
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Are you sure you want to cancel this booking?')) return;

            try {
                await api.put(`/bookings/${id}/cancel`);
                alert('Booking cancelled successfully');
                loadBookings();
            } catch (error) {
                alert('Failed to cancel: ' + error.message);
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            });
        }

        function formatTime(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit'
            });
        }
    </script>
</body>

</html>
