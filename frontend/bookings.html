<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Smart Campus</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-university"></i>
            <span>Smart Campus</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="events.html">Events</a>
            <a href="venues.html">Venues</a>
            <a href="bookings.html" class="active">My Bookings</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-calendar-check"></i> My Bookings</h1>
        </div>

        <div id="bookingsList" class="bookings-list">
            <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> Loading bookings...</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
                return;
            }
            await loadBookings();
        });

        async function loadBookings() {
            const list = document.getElementById('bookingsList');
            
            try {
                const response = await api.get('/bookings');
                const bookings = response.bookings || [];

                if (bookings.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-calendar-times"></i>
                            <p>No bookings yet</p>
                            <a href="venues.html" class="btn btn-primary">Book a Venue</a>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = bookings.map(b => `
                    <div class="booking-card ${b.status}">
                        <div class="booking-header">
                            <div>
                                <h3>${b.events?.title || 'Event'}</h3>
                                <span class="venue-name"><i class="fas fa-building"></i> ${b.venues?.name || 'Unknown Venue'}</span>
                            </div>
                            <span class="status-badge ${b.status}">${b.status}</span>
                        </div>
                        
                        <div class="booking-details">
                            <div class="detail">
                                <i class="fas fa-calendar"></i>
                                <span>${formatDate(b.start_datetime)}</span>
                            </div>
                            <div class="detail">
                                <i class="fas fa-clock"></i>
                                <span>${formatTime(b.start_datetime)} - ${formatTime(b.end_datetime)}</span>
                            </div>
                            <div class="detail">
                                <i class="fas fa-users"></i>
                                <span>${b.venues?.capacity || 'N/A'} capacity</span>
                            </div>
                            <div class="detail">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>${b.venues?.location || 'Campus'}</span>
                            </div>
                        </div>

                        <div class="booking-actions">
                            ${b.status === 'pending' ? `
                                <button class="btn btn-small btn-danger" onclick="cancelBooking(${b.id})">
                                    <i class="fas fa-times"></i> Cancel
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                list.innerHTML = `<p class="error">❌ Failed to load bookings: ${error.message}</p>`;
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Are you sure you want to cancel this booking?')) return;

            try {
                await api.put(`/bookings/${id}/cancel`);
                alert('Booking cancelled successfully');
                loadBookings();
            } catch (error) {
                alert('Failed to cancel: ' + error.message);
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            });
        }

        function formatTime(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit'
            });
        }
    </script>
</body>
</html>
