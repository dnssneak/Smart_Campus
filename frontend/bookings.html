<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Smart Campus</title>
    <link rel="stylesheet" href="css/new-design-system.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/logo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="modern-navbar">
        <a href="index.html" class="smart-campus-logo">
            <div class="logo-icon-wrapper">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
            </div>
            <div class="logo-text">
                <div class="logo-text-main">Smart Campus</div>
                <div class="logo-text-sub">Event Management</div>
            </div>
        </a>
        <div class="modern-nav-links">
            <a href="dashboard.html"><i class="fas fa-home"></i> <span>Dashboard</span></a>
            <a href="events.html"><i class="fas fa-calendar"></i> <span>Events</span></a>
            <a href="venues.html"><i class="fas fa-building"></i> <span>Venues</span></a>
            <a href="bookings.html" class="active"><i class="fas fa-calendar-check"></i> <span>Bookings</span></a>
            <a href="waitlist.html"><i class="fas fa-clock"></i> <span>Waitlist</span></a>
            <a href="resources.html"><i class="fas fa-boxes"></i> <span>Resources</span></a>
            <a href="analytics.html"><i class="fas fa-chart-line"></i> <span>Analytics</span></a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> <span>Reports</span></a>
            
            <!-- Bell Icon -->
            <div class="nav-bell" onclick="toggleBellDropdown(event)">
                <i class="fas fa-bell"></i>
                <span class="bell-badge" id="bellBadge">0</span>
                
                <div class="bell-dropdown" id="bellDropdown" onclick="event.stopPropagation()">
                    <div class="bell-dropdown-header">
                        <h4>Notifications</h4>
                        <button class="btn-modern btn-small btn-primary" onclick="markAllAsReadFromBell()">Mark all read</button>
                    </div>
                    <div class="bell-dropdown-list" id="bellDropdownList">
                        <p style="padding:1rem;text-align:center;color:#94a3b8">Loading...</p>
                    </div>
                    <div class="bell-dropdown-footer">
                        <a href="notifications.html">View all notifications</a>
                    </div>
                </div>
            </div>
            
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
        </div>
    </nav>
    
    <main class="container-modern" style="padding: var(--space-xl);">
        <div style="margin-bottom: var(--space-xl);">
            <h1 style="font-size: var(--font-size-h1); font-weight: 700; color: #0f172a; margin-bottom: var(--space-sm);">
                <i class="fas fa-calendar-check"></i> My Bookings
            </h1>
            <p style="color: var(--muted); font-size: var(--font-size-body);">View and manage your venue bookings</p>
        </div>

        <div id="bookingsList" class="events-grid">
            <p class="loading-text" style="text-align: center; padding: 2rem; color: var(--muted);">
                <i class="fas fa-spinner fa-spin"></i> Loading bookings...
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/bell-notifications.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
                return;
            }
            await loadBookings();
        });

        async function loadBookings() {
            const list = document.getElementById('bookingsList');

            try {
                const response = await api.get('/bookings');
                const bookings = response.bookings || [];

                if (bookings.length === 0) {
                    list.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 4rem; background: white; border-radius: var(--radius-card); box-shadow: var(--shadow-card);">
                            <i class="fas fa-calendar-times" style="font-size: 4rem; color: var(--muted); opacity: 0.5; margin-bottom: 1rem;"></i>
                            <p style="color: var(--muted); font-size: 1.1rem; margin-bottom: 1.5rem;">No bookings yet</p>
                            <a href="venues.html" class="btn-modern btn-primary">
                                <i class="fas fa-plus"></i> Book a Venue
                            </a>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = bookings.map(b => `
                    <div class="modern-event-card">
                        <div class="event-card-thumbnail" style="background: var(--gradient-accent);">
                            <div class="event-card-tags">
                                <span class="status-pill ${b.status}">${b.status}</span>
                                ${b.event?.category ? `<span class="status-pill" style="background: var(--info);">${b.event.category}</span>` : ''}
                            </div>
                        </div>
                        <div class="event-card-content">
                            <h3 class="event-card-title">${b.event?.title || 'Event Not Found'}</h3>
                            ${b.event?.description ? `<p style="color: var(--muted); font-size: 0.9rem; margin-bottom: var(--space-sm);">${b.event.description.substring(0, 100)}${b.event.description.length > 100 ? '...' : ''}</p>` : ''}
                            <div class="event-card-meta">
                                <div class="event-card-meta-row">
                                    <i class="fas fa-building"></i>
                                    <span><strong>${b.venue?.name || 'Unknown Venue'}</strong></span>
                                </div>
                                <div class="event-card-meta-row">
                                    <i class="fas fa-calendar"></i>
                                    <span>${formatDate(b.start_datetime)}</span>
                                </div>
                                <div class="event-card-meta-row">
                                    <i class="fas fa-clock"></i>
                                    <span>${formatTime(b.start_datetime)} - ${formatTime(b.end_datetime)}</span>
                                </div>
                                <div class="event-card-meta-row">
                                    <i class="fas fa-users"></i>
                                    <span>${b.venue?.capacity || 'N/A'} capacity</span>
                                </div>
                                <div class="event-card-meta-row">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span>${b.venue?.location || 'Campus'}</span>
                                </div>
                                ${b.status === 'confirmed' && b.approved_by_profile ? `
                                    <div class="event-card-meta-row" style="margin-top: var(--space-sm); padding-top: var(--space-sm); border-top: 1px solid var(--border);">
                                        <i class="fas fa-check-circle" style="color: var(--success);"></i>
                                        <span style="color: var(--success);">
                                            <strong>Approved by:</strong> ${b.approved_by_profile.first_name} ${b.approved_by_profile.last_name} (${b.approved_by_profile.role})
                                        </span>
                                    </div>
                                    ${b.approved_at ? `
                                        <div class="event-card-meta-row">
                                            <i class="fas fa-calendar-check"></i>
                                            <span style="font-size: 0.85rem; color: var(--muted);">
                                                Approved on ${formatDate(b.approved_at)}
                                            </span>
                                        </div>
                                    ` : ''}
                                ` : ''}
                                ${b.status === 'pending' ? `
                                    <div class="event-card-meta-row" style="margin-top: var(--space-sm); padding-top: var(--space-sm); border-top: 1px solid var(--border);">
                                        <i class="fas fa-hourglass-half" style="color: var(--warning);"></i>
                                        <span style="color: var(--warning);">
                                            <strong>Awaiting admin approval</strong>
                                        </span>
                                    </div>
                                ` : ''}
                            </div>
                            ${b.status === 'pending' ? `
                                <div class="event-card-footer" style="border-top: none; padding-top: var(--space-md);">
                                    <button class="btn-modern btn-small" style="background: var(--error); color: white; width: 100%;" onclick="cancelBooking(${b.id})">
                                        <i class="fas fa-times"></i> Cancel Booking
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                list.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem; background: white; border-radius: var(--radius-card); box-shadow: var(--shadow-card);">
                        <p style="color: var(--error);">❌ Failed to load bookings: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Are you sure you want to cancel this booking?')) return;

            try {
                await api.put(`/bookings/${id}/cancel`);
                showToast('Booking cancelled successfully', 'success');
                loadBookings();
            } catch (error) {
                showToast('Failed to cancel: ' + error.message, 'error');
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            });
        }

        function formatTime(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit'
            });
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer') || createToastContainer();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            toast.innerHTML = `
                <i class="fas fa-${icon}" style="font-size: 20px; color: var(--${type});"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'toastSlideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container';
            document.body.appendChild(container);
            return container;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
    
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
</body>

</html>
