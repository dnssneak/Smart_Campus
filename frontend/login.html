<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Campus</title>
    <link rel="stylesheet" href="css/new-design-system.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/logo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
            position: relative;
            z-index: 1;
        }
        
        /* Animated Background Elements */
        .animated-bg-items {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            animation: float 20s infinite linear;
            filter: blur(40px);
        }
        [data-theme="dark"] .bg-shape {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(168, 85, 247, 0.15) 100%);
        }
        .shape-1 {
            width: 500px;
            height: 500px;
            top: -150px;
            left: -150px;
            animation-duration: 25s;
        }
        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            animation-duration: 20s;
            animation-direction: reverse;
        }
        .shape-3 {
            width: 300px;
            height: 300px;
            top: 30%;
            left: 40%;
            animation-duration: 30s;
        }
        @keyframes float {
            0% { transform: rotate(0deg) translate(0, 0) scale(1); }
            33% { transform: rotate(120deg) translate(50px, -50px) scale(1.1); }
            66% { transform: rotate(240deg) translate(-50px, 50px) scale(0.9); }
            100% { transform: rotate(360deg) translate(0, 0) scale(1); }
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            animation: cardFadeIn 0.6s var(--ease-smooth);
            position: relative;
            z-index: 10;
        }
        .auth-box {
            background: var(--card-bg, white);
            border-radius: var(--radius-card);
            padding: var(--space-xl);
            box-shadow: var(--shadow-overlay);
            border: 1px solid var(--border-color, transparent);
        }
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }
        .auth-header .smart-campus-logo {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
        }
        .auth-header .logo-text {
            align-items: center;
        }
        .auth-header .logo-icon-wrapper {
            width: 56px;
            height: 56px;
        }
        .auth-header .logo-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
        }
        .auth-header .logo-icon i {
            font-size: 28px;
        }
        .auth-header .logo-text-main {
            font-size: 28px;
        }
        .auth-header .logo-text-sub {
            font-size: 11px;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .auth-header p {
            color: var(--text-secondary, var(--muted));
            font-size: var(--font-size-small);
            margin-top: -8px;
        }
        .auth-tabs {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            background: var(--bg-tertiary, var(--neutral-100));
            padding: var(--space-xs);
            border-radius: var(--radius-button);
        }
        .tab-btn {
            flex: 1;
            padding: var(--space-md);
            border: none;
            background: transparent;
            color: var(--text-secondary, var(--muted));
            font-weight: 600;
            font-size: var(--font-size-small);
            border-radius: var(--radius-button);
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-smooth);
        }
        .tab-btn.active {
            background: var(--card-bg, white);
            color: var(--primary);
            box-shadow: var(--shadow-card);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-primary, #0f172a);
            margin-bottom: var(--space-sm);
            font-size: var(--font-size-small);
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: var(--space-md);
            border: 2px solid var(--border-color, var(--divider));
            border-radius: var(--radius-button);
            font-size: var(--font-size-body);
            background: var(--input-bg, white);
            color: var(--text-primary, #0f172a);
            transition: all var(--duration-normal) var(--ease-smooth);
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }
        .auth-message {
            margin-top: var(--space-md);
            padding: var(--space-md);
            border-radius: var(--radius-button);
            text-align: center;
            font-size: var(--font-size-small);
        }
        .auth-message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }
        .auth-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="animated-bg-items">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <a href="#" class="smart-campus-logo">
                    <div class="logo-icon-wrapper">
                        <div class="logo-icon pulse">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                    </div>
                    <div class="logo-text">
                        <span class="logo-text-main">Smart Campus</span>
                        <span class="logo-text-sub">Management System</span>
                    </div>
                </a>
                <p>Login or create an account to continue</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="tab-btn" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> University Email</label>
                    <input type="email" id="loginEmail" placeholder="yourname@university.edu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-modern btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> First Name</label>
                        <input type="text" id="regFirstName" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Last Name</label>
                        <input type="text" id="regLastName" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> University Email</label>
                    <input type="email" id="regEmail" placeholder="yourname@university.edu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Role</label>
                        <select id="regRole" required>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="staff">Staff</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="regDept" placeholder="e.g., Computer Science">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone</label>
                    <input type="text" id="regPhone" placeholder="+1-555-0100">
                </div>
                <button type="submit" class="btn-modern btn-primary" style="width: 100%;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            document.getElementById('authMessage').innerHTML = '';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('authMessage');
            msgDiv.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i> Logging in...</p>';

            try {
                const result = await api.post('/auth/login', {
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                });

                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));

                msgDiv.innerHTML = '<p class="auth-message success">✅ Login successful! Redirecting...</p>';
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                msgDiv.innerHTML = '<p class="auth-message error">❌ ' + (error.message || 'Login failed') + '</p>';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('authMessage');
            msgDiv.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i> Creating account...</p>';

            try {
                const result = await api.post('/auth/register', {
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value,
                    firstName: document.getElementById('regFirstName').value,
                    lastName: document.getElementById('regLastName').value,
                    role: document.getElementById('regRole').value,
                    department: document.getElementById('regDept').value,
                    phone: document.getElementById('regPhone').value
                });

                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));

                msgDiv.innerHTML = '<p class="auth-message success">✅ Registration successful! Redirecting...</p>';
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                msgDiv.innerHTML = '<p class="auth-message error">❌ ' + (error.message || 'Registration failed') + '</p>';
            }
        });

    </script>
    
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
</body>
</html>
