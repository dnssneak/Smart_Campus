<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Campus</title>
    <link rel="stylesheet" href="css/new-design-system.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/logo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: var(--gradient-hero);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }
        .auth-container {
            width: 100%;
            max-width: 480px;
            animation: cardFadeIn 0.6s var(--ease-smooth);
        }
        .auth-box {
            background: white;
            border-radius: var(--radius-card);
            padding: var(--space-xl);
            box-shadow: var(--shadow-overlay);
        }
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }
        .auth-header i {
            font-size: 48px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-md);
        }
        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: var(--space-sm);
        }
        .auth-header p {
            color: var(--muted);
            font-size: var(--font-size-small);
        }
        .auth-tabs {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            background: var(--neutral-100);
            padding: var(--space-xs);
            border-radius: var(--radius-button);
        }
        .tab-btn {
            flex: 1;
            padding: var(--space-md);
            border: none;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            font-size: var(--font-size-small);
            border-radius: var(--radius-button);
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-smooth);
        }
        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-card);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: var(--space-sm);
            font-size: var(--font-size-small);
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: var(--space-md);
            border: 2px solid var(--divider);
            border-radius: var(--radius-button);
            font-size: var(--font-size-body);
            transition: all var(--duration-normal) var(--ease-smooth);
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }
        .auth-message {
            margin-top: var(--space-md);
            padding: var(--space-md);
            border-radius: var(--radius-button);
            text-align: center;
            font-size: var(--font-size-small);
        }
        .auth-message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }
        .auth-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-university"></i>
                <h1>Smart Campus</h1>
                <p>Event & Venue Management System</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="tab-btn" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> University Email</label>
                    <input type="email" id="loginEmail" placeholder="yourname@university.edu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-modern btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> First Name</label>
                        <input type="text" id="regFirstName" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Last Name</label>
                        <input type="text" id="regLastName" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> University Email</label>
                    <input type="email" id="regEmail" placeholder="yourname@university.edu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Role</label>
                        <select id="regRole" required>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="staff">Staff</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-building"></i> Department</label>
                        <input type="text" id="regDept" placeholder="e.g., Computer Science">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone</label>
                    <input type="text" id="regPhone" placeholder="+1-555-0100">
                </div>
                <button type="submit" class="btn-modern btn-primary" style="width: 100%;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            document.getElementById('authMessage').innerHTML = '';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('authMessage');
            msgDiv.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i> Logging in...</p>';

            try {
                const result = await api.post('/auth/login', {
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                });

                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));

                msgDiv.innerHTML = '<p class="auth-message success">✅ Login successful! Redirecting...</p>';
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                msgDiv.innerHTML = '<p class="auth-message error">❌ ' + (error.message || 'Login failed') + '</p>';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('authMessage');
            msgDiv.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i> Creating account...</p>';

            try {
                const result = await api.post('/auth/register', {
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value,
                    firstName: document.getElementById('regFirstName').value,
                    lastName: document.getElementById('regLastName').value,
                    role: document.getElementById('regRole').value,
                    department: document.getElementById('regDept').value,
                    phone: document.getElementById('regPhone').value
                });

                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));

                msgDiv.innerHTML = '<p class="auth-message success">✅ Registration successful! Redirecting...</p>';
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                msgDiv.innerHTML = '<p class="auth-message error">❌ ' + (error.message || 'Registration failed') + '</p>';
            }
        });

    </script>
    
    <!-- Theme Manager -->
    <script src="js/theme.js"></script>
</body>
</html>
