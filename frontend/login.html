<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Smart Campus</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-university"></i>
                <h1>Smart Campus</h1>
                <p>Event & Venue Management System</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> University Email</label>
                    <input type="email" id="loginEmail" placeholder="yourname@university.edu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFirstName" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLastName" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> University Email</label>
                    <input type="email" id="regEmail" placeholder="yourname@university.edu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Role</label>
                        <select id="regRole" required>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="society_rep">Society Representative</option>
                            <option value="technical_staff">Technical Staff</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" id="regDept" placeholder="e.g., Computer Science">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone</label>
                    <input type="text" id="regPhone" placeholder="+1-555-0100">
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            document.getElementById('authMessage').innerHTML = '';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('authMessage');
            msgDiv.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i> Logging in...</p>';

            try {
                const result = await api.post('/auth/login', {
                    email: document.getElementById('loginEmail').value,
                    password: document.getElementById('loginPassword').value
                });

                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));

                showMessage('✅ Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                showMessage('❌ ' + (error.message || 'Login failed'), 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('authMessage');
            msgDiv.innerHTML = '<p class="loading"><i class="fas fa-spinner fa-spin"></i> Registering...</p>';

            try {
                const result = await api.post('/auth/register', {
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value,
                    firstName: document.getElementById('regFirstName').value,
                    lastName: document.getElementById('regLastName').value,
                    role: document.getElementById('regRole').value,
                    department: document.getElementById('regDept').value,
                    phone: document.getElementById('regPhone').value
                });

                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));

                showMessage('✅ Registration successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                showMessage('❌ ' + (error.message || 'Registration failed'), 'error');
            }
        });

        function showMessage(msg, type) {
            const el = document.getElementById('authMessage');
            el.innerHTML = msg;
            el.className = `auth-message ${type}`;
        }
    </script>
</body>
</html>
