<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics - Smart Campus</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-university"></i>
            <span>Smart Campus</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="events.html">Events</a>
            <a href="venues.html">Venues</a>
            <a href="bookings.html">My Bookings</a>
            <a href="reports.html" class="active">Reports</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1><i class="fas fa-chart-line"></i> Reports & Analytics</h1>
            <div class="date-filters">
                <input type="date" id="startDate" onchange="loadReports()">
                <input type="date" id="endDate" onchange="loadReports()">
                <button class="btn btn-secondary" onclick="resetDates()">
                    <i class="fas fa-sync"></i> Reset
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid four">
            <div class="stat-card large">
                <i class="fas fa-building" style="color: #6366f1;"></i>
                <div>
                    <h3 id="totalVenues">--</h3>
                    <p>Total Venues</p>
                </div>
            </div>
            <div class="stat-card large">
                <i class="fas fa-star" style="color: #f59e0b;"></i>
                <div>
                    <h3 id="totalEvents">--</h3>
                    <p>Total Events</p>
                </div>
            </div>
            <div class="stat-card large">
                <i class="fas fa-calendar-check" style="color: #10b981;"></i>
                <div>
                    <h3 id="totalBookings">--</h3>
                    <p>Total Bookings</p>
                </div>
            </div>
            <div class="stat-card large">
                <i class="fas fa-users" style="color: #ec4899;"></i>
                <div>
                    <h3 id="totalUsers">--</h3>
                    <p>Total Users</p>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="dashboard-widgets">
            <div class="widget">
                <h3>Event Status Breakdown</h3>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="widget">
                <h3>Events by Category</h3>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- Venue Utilization -->
        <div class="widget" style="margin-top: 2rem;">
            <h3>Venue Utilization</h3>
            <canvas id="utilizationChart"></canvas>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let statusChart, categoryChart, utilizationChart;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('token')) {
                window.location.href = 'login.html';
                return;
            }

            // Set default date range (last 30 days)
            const end = new Date();
            const start = new Date();
            start.setDate(start.getDate() - 30);
            
            document.getElementById('endDate').value = end.toISOString().split('T')[0];
            document.getElementById('startDate').value = start.toISOString().split('T')[0];

            await loadReports();
        });

        async function loadReports() {
            try {
                await Promise.all([
                    loadStats(),
                    loadEventStatus(),
                    loadEventsByCategory(),
                    loadVenueUtilization()
                ]);
            } catch (error) {
                console.error('Failed to load reports:', error);
            }
        }

        async function loadStats() {
            try {
                const response = await api.get('/reports/dashboard');
                const stats = response.stats;
                
                document.getElementById('totalVenues').textContent = stats.totalVenues;
                document.getElementById('totalEvents').textContent = stats.totalEvents;
                document.getElementById('totalBookings').textContent = stats.totalBookings;
                document.getElementById('totalUsers').textContent = stats.totalUsers;
            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        async function loadEventStatus() {
            try {
                const response = await api.get('/reports/event-status');
                const breakdown = response.breakdown;

                const ctx = document.getElementById('statusChart').getContext('2d');
                
                if (statusChart) statusChart.destroy();

                statusChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Pending', 'Approved', 'Rejected', 'Cancelled'],
                        datasets: [{
                            data: [
                                breakdown.pending,
                                breakdown.approved,
                                breakdown.rejected,
                                breakdown.cancelled
                            ],
                            backgroundColor: ['#f59e0b', '#10b981', '#ef4444', '#94a3b8']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            } catch (error) {
                console.error('Status chart error:', error);
            }
        }

        async function loadEventsByCategory() {
            try {
                const response = await api.get('/reports/events-by-category');
                const categories = response.categories;

                const labels = Object.keys(categories);
                const data = Object.values(categories);

                const ctx = document.getElementById('categoryChart').getContext('2d');
                
                if (categoryChart) categoryChart.destroy();

                categoryChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(l => l.charAt(0).toUpperCase() + l.slice(1)),
                        datasets: [{
                            label: 'Events',
                            data: data,
                            backgroundColor: '#6366f1'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } }
                        }
                    }
                });
            } catch (error) {
                console.error('Category chart error:', error);
            }
        }

        async function loadVenueUtilization() {
            try {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                
                let url = '/reports/venue-utilization';
                if (startDate && endDate) {
                    url += `?startDate=${startDate}&endDate=${endDate}`;
                }

                const response = await api.get(url);
                const utilization = response.utilization;

                const ctx = document.getElementById('utilizationChart').getContext('2d');
                
                if (utilizationChart) utilizationChart.destroy();

                utilizationChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: utilization.map(u => u.venueName),
                        datasets: [{
                            label: 'Hours Booked',
                            data: utilization.map(u => u.hoursBooked),
                            backgroundColor: '#8b5cf6'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: 'Hours' } }
                        }
                    }
                });
            } catch (error) {
                console.error('Utilization chart error:', error);
            }
        }

        function resetDates() {
            const end = new Date();
            const start = new Date();
            start.setDate(start.getDate() - 30);
            
            document.getElementById('endDate').value = end.toISOString().split('T')[0];
            document.getElementById('startDate').value = start.toISOString().split('T')[0];
            
            loadReports();
        }
    </script>
</body>
</html>
