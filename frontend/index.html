<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Test</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<script>
// ─── Bell Dropdown Functions ───
async function updateBellBadge() {
    try {
        const response = await api.get('/notifications/unread-count');
        const count = response.unreadCount || 0;
        const badge = document.getElementById('bellBadge');
        
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.style.display = 'block';
        } else {
            badge.style.display = 'none';
        }
    } catch (error) {
        console.error('Badge error:', error);
    }
}

async function loadBellDropdown() {
    try {
        const response = await api.get('/notifications?unreadOnly=true');
        const notifications = response.notifications || [];
        const list = document.getElementById('bellDropdownList');

        if (notifications.length === 0) {
            list.innerHTML = `<p style="padding:1.5rem;text-align:center;color:#94a3b8">No unread notifications</p>`;
            return;
        }

        const iconMap = {
            event_approved: 'fa-check-circle',
            event_rejected: 'fa-times-circle',
            booking_confirmed: 'fa-calendar-check',
            booking_cancelled: 'fa-calendar-times',
            waitlist_promotion: 'fa-arrow-up',
            venue_conflict: 'fa-exclamation-triangle',
            system: 'fa-info-circle'
        };

        list.innerHTML = notifications.slice(0, 5).map(n => `
            <div class="bell-dropdown-item ${n.is_read ? '' : 'unread'}" onclick="window.location.href='notifications.html'">
                <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${getIconColor(n.type)};color:white;font-size:0.9rem">
                    <i class="fas ${iconMap[n.type] || 'fa-bell'}"></i>
                </div>
                <div style="flex:1">
                    <div style="font-weight:600;font-size:0.9rem;color:#1e293b">${n.title}</div>
                    <div style="font-size:0.8rem;color:#64748b">${n.message.substring(0, 50)}${n.message.length > 50 ? '...' : ''}</div>
                    <small>${getTimeAgo(n.created_at)}</small>
                </div>
            </div>
        `).join('');

    } catch (error) {
        console.error('Dropdown error:', error);
    }
}

function getIconColor(type) {
    const colors = {
        event_approved: '#059669',
        event_rejected: '#dc2626',
        booking_confirmed: '#2563eb',
        booking_cancelled: '#d97706',
        waitlist_promotion: '#6366f1',
        venue_conflict: '#db2777',
        system: '#6b7280'
    };
    return colors[type] || '#6366f1';
}

function getTimeAgo(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);
    
    if (seconds < 60) return 'Just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function toggleBellDropdown(e) {
    e.stopPropagation();
    document.getElementById('bellDropdown').classList.toggle('show');
}

async function markAllAsReadFromBell() {
    try {
        await api.put('/notifications/mark-all-read');
        updateBellBadge();
        loadBellDropdown();
    } catch (error) {
        console.error('Mark all read error:', error);
    }
}

// Close dropdown when clicking outside
document.addEventListener('click', () => {
    const dropdown = document.getElementById('bellDropdown');
    if (dropdown) dropdown.classList.remove('show');
});

// Auto-refresh badge every 30 seconds
setInterval(() => {
    if (localStorage.getItem('token')) {
        updateBellBadge();
        loadBellDropdown();
    }
}, 30000);

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('token')) {
        updateBellBadge();
        loadBellDropdown();
    }
});
</script>

<body>
    <nav class="navbar">
    <div class="nav-brand">
        <i class="fas fa-university"></i>
        <span>Smart Campus</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="events.html">Events</a>
        <a href="venues.html">Venues</a>
        <a href="bookings.html">My Bookings</a>
        <a href="waitlist.html">Waitlist</a>
        <a href="reports.html">Reports</a>
        
        <!-- Bell Icon -->
        <div class="nav-bell" onclick="toggleBellDropdown(event)">
            <i class="fas fa-bell"></i>
            <span class="bell-badge" id="bellBadge">0</span>
            
            <div class="bell-dropdown" id="bellDropdown" onclick="event.stopPropagation()">
                <div class="bell-dropdown-header">
                    <h4>Notifications</h4>
                    <button class="btn btn-small" onclick="markAllAsReadFromBell()">Mark all read</button>
                </div>
                <div class="bell-dropdown-list" id="bellDropdownList">
                    <p style="padding:1rem;text-align:center;color:#94a3b8">Loading...</p>
                </div>
                <div class="bell-dropdown-footer">
                    <a href="notifications.html">View all notifications</a>
                </div>
            </div>
        </div>
        
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</nav>

    <main class="container">
        <h1>🔧 Backend API Test</h1>

        <!-- Health Check -->
        <div class="test-card">
            <h2>1. Health Check</h2>
            <button onclick="testHealth()">Test Connection</button>
            <div id="healthResult" class="result"></div>
        </div>

        <!-- Register -->
        <div class="test-card">
            <h2>2. Register User</h2>
            <input type="email" id="regEmail" placeholder="test@university.edu" value="test@university.edu">
            <input type="password" id="regPassword" placeholder="password" value="test123">
            <input type="text" id="regFirstName" placeholder="First Name" value="Test">
            <input type="text" id="regLastName" placeholder="Last Name" value="User">
            <select id="regRole">
                <option value="student">Student</option>
                <option value="faculty">Faculty</option>
                <option value="society_rep">Society Rep</option>
                <option value="admin">Admin</option>
            </select>
            <input type="text" id="regDept" placeholder="Department" value="CS">
            <button onclick="testRegister()">Register</button>
            <div id="registerResult" class="result"></div>
        </div>

        <!-- Login -->
        <div class="test-card">
            <h2>3. Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" value="test@university.edu">
            <input type="password" id="loginPassword" placeholder="Password" value="test123">
            <button onclick="testLogin()">Login</button>
            <div id="loginResult" class="result"></div>
        </div>

        <!-- Get Profile -->
        <div class="test-card">
            <h2>4. Get Profile (needs token)</h2>
            <button onclick="testProfile()">Get My Profile</button>
            <div id="profileResult" class="result"></div>
        </div>

        <!-- Token Display -->
        <div class="test-card">
            <h2>Current Token</h2>
            <textarea id="tokenDisplay" readonly placeholder="No token yet..."></textarea>
            <button onclick="clearToken()" class="btn-danger">Clear Token</button>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        // Health Check
        async function testHealth() {
            const resultDiv = document.getElementById('healthResult');
            resultDiv.innerHTML = '<p class="loading">Testing...</p>';

            try {
                const data = await api.get('/health');
                resultDiv.innerHTML = `
                    <p class="success">✅ ${data.message}</p>
                    <p>Venues: ${data.venues_count}</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ ${error.message}</p>`;
            }
        }

        // Register
        async function testRegister() {
            const resultDiv = document.getElementById('registerResult');
            resultDiv.innerHTML = '<p class="loading">Registering...</p>';

            const data = {
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                firstName: document.getElementById('regFirstName').value,
                lastName: document.getElementById('regLastName').value,
                role: document.getElementById('regRole').value,
                department: document.getElementById('regDept').value
            };

            try {
                const result = await api.post('/auth/register', data);

                // Save token
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                updateTokenDisplay();

                resultDiv.innerHTML = `
                    <p class="success">✅ Registered!</p>
                    <pre>${JSON.stringify(result.user, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ ${error.message}</p>`;
            }
        }

        // Login
        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<p class="loading">Logging in...</p>';

            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const result = await api.post('/auth/login', data);

                // Save token
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                updateTokenDisplay();

                resultDiv.innerHTML = `
                    <p class="success">✅ Logged in!</p>
                    <pre>${JSON.stringify(result.user, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ ${error.message}</p>`;
            }
        }

        // Get Profile
        async function testProfile() {
            const resultDiv = document.getElementById('profileResult');
            resultDiv.innerHTML = '<p class="loading">Fetching...</p>';

            if (!localStorage.getItem('token')) {
                resultDiv.innerHTML = '<p class="error">❌ No token! Login first.</p>';
                return;
            }

            try {
                const data = await api.get('/auth/profile');
                resultDiv.innerHTML = `
                    <p class="success">✅ Profile loaded!</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ ${error.message}</p>`;
            }
        }

        // Token management
        function updateTokenDisplay() {
            const token = localStorage.getItem('token');
            document.getElementById('tokenDisplay').value = token || 'No token';
        }

        function clearToken() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            updateTokenDisplay();
            alert('Token cleared!');
        }

        // Load token on page load
        updateTokenDisplay();
    </script>
</body>

</html>
